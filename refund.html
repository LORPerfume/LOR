<h1>Refund Policy</h1>

<h2>1. Eligibility</h2>
<p>Refunds are available only if the product is damaged or not as described.</p>

<h2>2. Request Time</h2>
<p>Refund requests must be made within 3 days of receiving the order.</p>

<h2>3. Processing</h2>
<p>Once approved, refunds will be processed within 5–10 business days.</p>
