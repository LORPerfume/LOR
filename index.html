<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOR Perfume</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    /* اللوجو */
    .logo {
      display: block;
      margin: 20px auto;
      width: 180px;
    }

    /* نفس فكرة المنتجات بدون تغيير كبير */
    .product {
      text-align: center;
      margin: 20px;
    }

    .product img {
      width: 300px;
      max-width: 90%;
      border-radius: 10px;
    }

    .product h2 {
      margin: 10px 0 5px;
    }

    .product p {
      color: gray;
    }

    #contact {
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <!-- الهيدر -->
  <header>
    <h1>LOR Perfume</h1>
  </header>

  <!-- اللوجو (مضاف صح) -->
  <img src="logo.png" class="logo" alt="Logo">

  <!-- المنتج (مضاف صورة بدون ما نغير شكل الموقع) -->
  <div class="product">
    <img src="product.jpg" alt="Product">
    <h2>Luxury Butter Perfume</h2>
    <p>Eau de Parfum - 1.01 FL.OZ</p>
  </div>

  <!-- contact نفس القسم -->
  <div id="contact">
    <h2>Contact Us</h2>
    <p>Instagram | WhatsApp | Email</p>
  </div>

</body>
</html>
