<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOR Perfume Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  header {
    background: black;
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
  }

  .logo {
    width: 120px;
  }

  .container {
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: white;
    width: 300px;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    border-radius: 12px;
  }

  .title {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
  }

  .desc {
    color: gray;
    font-size: 14px;
  }

  /* السعر */
  .price {
    margin-top: 10px;
    font-size: 16px;
  }

  .old-price {
    text-decoration: line-through;
    color: gray;
    margin-right: 8px;
  }

  .new-price {
    color: #25D366;
    font-weight: bold;
    font-size: 18px;
  }

  /* شرح المنتج */
  .about {
    margin-top: 15px;
    font-size: 14px;
    color: #333;
    line-height: 1.6;
  }

  .btn {
    display: block;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    margin-top: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  .whatsapp { background: #25D366; }

  .cart-box {
    position: fixed;
    right: 15px;
    bottom: 15px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    width: 220px;
  }

  .cart-item {
    font-size: 14px;
  }

  .contact {
    background: black;
    color: white;
    text-align: center;
    padding: 40px;
    margin-top: 40px;
  }

  .contact a {
    display: inline-block;
    margin: 10px;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: bold;
  }

  .insta { background: #E1306C; }
  .wa { background: #25D366; }

</style>
</head>

<body>

<header>
  <img class="logo" src="logo.png" alt="Logo">
</header>

<div class="container">

  <div class="card">

    <img src="product.jpg" alt="Product">

    <div class="title">Luxury Butter Perfume</div>
    <div class="desc">Eau de Parfum - 1.01 FL.OZ</div>

    <!-- السعر -->
    <div class="price">
      <span class="old-price">35 JD</span>
      <span class="new-price">23 JD</span>
    </div>

    <!-- شرح -->
    <div class="about">
      عطر فاخر بثبات عالي ورائحة ناعمة فاخرة تدوم طوال اليوم.
      مناسب للاستخدام اليومي والهدايا المميزة.
    </div>

    <button class="btn whatsapp"
      onclick="addToCart('Luxury Butter Perfume - 23 JD')">
      Add to Cart
    </button>

    <a class="btn whatsapp"
       href="https://wa.me/962787727783?text=I%20want%20to%20buy%20Luxury%20Butter%20Perfume%20for%2023%20JD"
       target="_blank">
      Buy on WhatsApp
    </a>

  </div>

</div>

<!-- سلة -->
<div class="cart-box">
  <h3>Cart 🛒</h3>
  <div id="cartItems"></div>
</div>

<!-- تواصل -->
<div class="contact">
  <h2>Contact Us</h2>

  <a class="wa"
     href="https://wa.me/962787727783"
     target="_blank">
     WhatsApp
  </a>

  <a class="insta"
     href="https://www.instagram.com/lorperfumejordan?igsh=ZnhpODdhNGZ0a3pw"
     target="_blank">
     Instagram
  </a>
</div>

<script>
let cart = [];

function addToCart(product) {
  cart.push(product);
  updateCart();
}

function updateCart() {
  let cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";

  cart.forEach(item => {
    cartDiv.innerHTML += "<div class='cart-item'>• " + item + "</div>";
  });
}
</script>

</body>
</html>
