<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOR Perfume</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #111;
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 22px;
    letter-spacing: 2px;
}

/* PRODUCT */
.container {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.card {
    background: white;
    width: 320px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

h2 {
    margin: 15px 0 5px;
}

.desc {
    color: #777;
    font-size: 14px;
    margin-bottom: 10px;
}

/* PRICE (no 35 removed completely) */
.price {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* BUY BUTTON */
.buy-btn {
    display: inline-block;
    margin: 15px 0 25px;
    padding: 12px 30px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    transition: 0.3s;
    font-weight: bold;
}

.buy-btn:hover {
    background: #333;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #888;
}
</style>

</head>

<body>

<header>
    LOR PERFUME
</header>

<div class="container">

    <div class="card">

        <!-- حط صورة المنتج هون -->
        <img src="your-image.jpg" alt="Perfume">

        <h2>Luxury Butter Perfume</h2>

        <div class="desc">
            Eau de Parfum • 50 ML • Luxury Scent
        </div>

        <!-- السعر الحالي فقط بدون 35 -->
        <div class="price">
            50 JD
        </div>

        <!-- زر Buy Now -->
        <a class="buy-btn" href="https://wa.me/0000000000" target="_blank">
            BUY NOW
        </a>

    </div>

</div>

<footer>
    © 2026 LOR PERFUME - All Rights Reserved
</footer>

</body>
</html>
